version: '3.3'

services:
  web:
    container_name: street-gallery.web
    build: ./app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/usr/src/app/
      - ./app/static:/usr/src/app/static
      - media_volume:/usr/src/app/media
    ports:
      - "8080:8000"
    depends_on:
      - mysql
    env_file:
      - ./app/.env
    networks:
      local_network:
        ipv4_address: 172.28.1.4
    
  mysql:
    image: mysql:latest
    container_name: streetgallery.mysql
    restart: always
    volumes:
      - db_data:/var/lib/mysql:rw
    environment:
      # Usamos las variables del .env
      MYSQL_ROOT_PASSWORD: ${DATABASE_PWD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    ports:
      - "3306:3306"
    networks:
      local_network:
        ipv4_address: 172.28.1.5

volumes:
  static_volume:
  media_volume:
  db_data:

networks:
  local_network:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16